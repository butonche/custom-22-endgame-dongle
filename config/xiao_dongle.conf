CONFIG_ZMK_KEYBOARD_NAME="Custom 22"
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=3
CONFIG_BT_MAX_PAIRED=4
CONFIG_BT_MAX_CONN=4
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y
CONFIG_ZMK_POINTING=y

# Dongle is USB-powered, no sleep. Idle blanks OLED after 30s.
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_TIMEOUT=30000

# 6DOF dongle-side axis remapper
CONFIG_ZMK_6DOF=y
CONFIG_ZMK_INPUT_PROCESSOR_6DOF=y
