CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=2700000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=2700000

# Mixer tuning (runs on peripheral)
CONFIG_POINTER_2S_MIXER_ENSURE_SYNC=y
CONFIG_POINTER_2S_MIXER_SYNC_WINDOW_MS=10
CONFIG_POINTER_2S_MIXER_DEFAULT_MOVE_COEF=20
CONFIG_POINTER_2S_MIXER_DEFAULT_TWIST_COEF=10
CONFIG_POINTER_2S_MIXER_EMA_ALPHA=10
CONFIG_POINTER_2S_MIXER_SMA_EN=y
CONFIG_POINTER_2S_MIXER_SCROLL_DISABLES_POINTER=y
CONFIG_POINTER_2S_MIXER_POINTER_AFTER_SCROLL_ACTIVATION=100
CONFIG_POINTER_2S_MIXER_STEADY_THRES=4
CONFIG_POINTER_2S_MIXER_STEADY_COOLDOWN=200
CONFIG_POINTER_2S_MIXER_DELTA_Y_OVER_TRANS_MAG_MUL=9
CONFIG_POINTER_2S_MIXER_DELTA_Y_OVER_TRANS_MAG_DIV=6
CONFIG_POINTER_2S_MIXER_DIRECTION_FILTER_EN=y
CONFIG_POINTER_2S_MIXER_DIRECTION_FILTER_TTL=80
CONFIG_POINTER_2S_MIXER_34_FILTER_EN=y
CONFIG_POINTER_2S_MIXER_REMAINDER_TTL=16
CONFIG_POINTER_2S_MIXER_TWIST_REMAINDER_TTL=100
CONFIG_POINTER_2S_MIXER_TWIST_FILTER_TTL=65
CONFIG_POINTER_2S_MIXER_TWIST_FILTER_DEBOUNCE=35
CONFIG_POINTER_2S_MIXER_SIGNIFICANT_MOVEMENT_MUL=15
CONFIG_POINTER_2S_MIXER_FEEDBACK_EN=n

# 6DOF SpaceMouse mode
CONFIG_ZMK_6DOF=y
CONFIG_ZMK_6DOF_SCALE=100
CONFIG_ZMK_6DOF_RELAY=y

# Sensor
CONFIG_PAW3395_REPORT_INTERVAL_MIN=0
CONFIG_PAW3395_INIT_POWER_UP_EXTRA_DELAY_MS=850
